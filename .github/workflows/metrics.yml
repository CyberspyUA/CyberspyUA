name: Metrics
on:
  # Schedule updates (daily)
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger
  workflow_dispatch:
  # Trigger on push to main branch
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # We use the standard name we just created in Step 1
          token: ${{ secrets.METRICS_TOKEN }}
          user: cyberspyua
          template: classic
          
          # Empty base to hide the big stats card
          base: ""
          
          # Trophies Plugin Configuration
          plugin_trophies: yes
          plugin_trophies_display: compact 
          plugin_trophies_secrets: yes
          plugin_trophies_str: yes
