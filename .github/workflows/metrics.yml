name: Metrics
on:
  # Schedule updates (once a day)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run it manually from the Actions tab for testing
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Options
          user: cyberspyua
          template: classic
          base: ""
          config_timezone: Europe/Kiev
          
          # This enables the Trophies section
          plugin_trophies: yes
          plugin_trophies_display: compacted 
          plugin_trophies_secrets: yes
          plugin_trophies_str: yes
