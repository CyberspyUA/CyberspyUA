name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (Optional) Run workflow manually
  workflow_dispatch:
  # (Optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cyberspyua
          template: classic
          
          # 1. DISABLE standard stats (this removes the text lists)
          base: ""
          
          # 2. ENABLE Trophies
          plugin_trophies: yes
          plugin_trophies_display: compact 
          plugin_trophies_secrets: yes
          plugin_trophies_str: yes
