name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (Optional) Run workflow manually
  workflow_dispatch:
  # (Optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # using the secret name you confirmed
          token: ${{ secrets.Cyberspy_Profile_Trophies }}
          user: cyberspyua
          template: classic
          
          # Disable the standard stats/header so only trophies show
          base: ""
          
          # Trophies Plugin Settings
          plugin_trophies: yes
          plugin_trophies_display: compact 
          plugin_trophies_secrets: yes
          plugin_trophies_str: yes
